<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─────────────────────────────────────────────
   UTILS
───────────────────────────────────────────── */
const fmt={
  usd:(v,d=2)=>(v>=0?'+':'-')+'$'+Math.abs(v).toFixed(d),
  date:s=>new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}),
  time:s=>new Date(s).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
};
const uid=()=>'T'+Date.now()+'_'+Math.random().toString(36).slice(2,7);

function getSession(iso){
  const h=new Date(iso).getUTCHours();
  if(h>=22||h<6)return'Asian';
  if(h>=6&&h<12)return'London';
  if(h>=12&&h<17)return'New York';
  return'Late Session';
}
function getKZ(iso){
  const t=new Date(iso).getUTCHours()*60+new Date(iso).getUTCMinutes();
  if(t<180)return'Asian KZ';
  if(t>=360&&t<570)return'London KZ';
  if(t>=720&&t<870)return'NY AM KZ';
  if(t>=870&&t<1020)return'London Close KZ';
  return null;
}
function getDay(iso){return new Date(iso).toLocaleDateString('en-US',{weekday:'short'});}

function enrich(t){
  const ot=t.openTime||new Date().toISOString();
  const ct=t.closeTime||new Date().toISOString();
  return{
    id:uid(),
    symbol:(t.symbol||'UNKNOWN').replace(/m$/i,'').toUpperCase(),
    type:(t.type||'BUY').toUpperCase(),
    openTime:ot,closeTime:ct,
    openPrice:+(t.openPrice||0),closePrice:+(t.closePrice||0),
    volume:+(t.volume||0),
    profit:parseFloat((+(t.profit||0)).toFixed(2)),
    commission:+(t.commission||0),swap:+(t.swap||0),
    duration:t.openTime&&t.closeTime?Math.round((new Date(ct)-new Date(ot))/60000):null,
    session:getSession(ot),killZone:getKZ(ot),day:getDay(ot),
    note:'',source:t.source||'manual',
  };
}

function calcStats(trades){
  if(!trades.length)return{wins:0,losses:0,winRate:0,totalPnl:0,
    avgWin:0,avgLoss:0,profitFactor:0,maxDD:0,streak:[],grossWin:0,grossLoss:0};
  const wins=trades.filter(t=>t.profit>0),losses=trades.filter(t=>t.profit<=0);
  const gw=wins.reduce((s,t)=>s+t.profit,0);
  const gl=Math.abs(losses.reduce((s,t)=>s+t.profit,0));
  const tp=trades.reduce((s,t)=>s+t.profit,0);
  let peak=0,maxDD=0,run=0;
  [...trades].sort((a,b)=>new Date(a.closeTime)-new Date(b.closeTime))
    .forEach(t=>{run+=t.profit;if(run>peak)peak=run;const dd=peak-run;if(dd>maxDD)maxDD=dd;});
  return{wins:wins.length,losses:losses.length,
    winRate:wins.length/trades.length*100,totalPnl:tp,
    grossWin:gw,grossLoss:gl,
    avgWin:wins.length?gw/wins.length:0,
    avgLoss:losses.length?gl/losses.length:0,
    profitFactor:gl>0?gw/gl:gw>0?99:0,maxDD,
    streak:trades.slice(-20).map(t=>t.profit>0?'w':'l')};
}
function calcSessions(t){
  return['Asian','London','New York','Late Session'].map(s=>{
    const ts=t.filter(x=>x.session===s),st=calcStats(ts);
    return{session:s,count:ts.length,winRate:st.winRate,pnl:st.totalPnl};
  });
}
function calcPairs(t){
  const m={};t.forEach(x=>{if(!m[x.symbol])m[x.symbol]=[];m[x.symbol].push(x);});
  return Object.entries(m).map(([sym,ts])=>{
    const st=calcStats(ts);
    return{symbol:sym,count:ts.length,winRate:st.winRate,pnl:st.totalPnl};
  }).sort((a,b)=>b.pnl-a.pnl);
}

const LS={
  get:k=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

/* ─────────────────────────────────────────────
   LAYER 1: LOCAL OCR  (Tesseract.js)
   Zero network after first load. Runs in browser.
   No API key. No rate limits. Works offline.
───────────────────────────────────────────── */
async function runOCR(dataUrl,onProg){
  // Preprocess: upscale 2.5x + invert dark-theme to white bg for OCR accuracy
  const processed=await new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const S=2.5,cv=document.createElement('canvas');
      cv.width=img.width*S;cv.height=img.height*S;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      const id=ctx.getImageData(0,0,cv.width,cv.height),d=id.data;
      for(let i=0;i<d.length;i+=4){
        const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        const v=g<148?255:0;
        d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
      res(cv.toDataURL('image/png'));
    };
    img.src=dataUrl;
  });

  onProg(5,'Loading OCR engine (first time ~15s, then instant)…');
  const result=await Tesseract.recognize(processed,'eng',{
    logger:m=>{
      if(m.status==='recognizing text')
        onProg(10+Math.round(m.progress*85),'Scanning: '+Math.round(m.progress*100)+'%');
      else if(m.status.includes('load')||m.status.includes('init'))
        onProg(5,'Loading OCR engine…');
    }
  });
  onProg(100,'OCR complete');
  return result.data.text;
}

/* ─────────────────────────────────────────────
   LAYER 2: MT5 REGEX PARSER  (pure JS)
   Takes OCR text → structured trades.
   Zero dependencies. Instant. Always works.
───────────────────────────────────────────── */
function parseMT5(text){
  const yr=new Date().getFullYear();
  const trades=[];
  const full=text.split('\n').map(l=>l.trim()).filter(Boolean).join('\n');

  function toISO(s){
    if(!s)return null;
    // "2026.04.24 08:12" or "2026-04-24 08:12"
    let m=s.match(/(\d{4})[.\/-](\d{2})[.\/-](\d{2})\s+(\d{2}):(\d{2})/);
    if(m)return`${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:00.000Z`;
    // "24.04.26 08:12"
    m=s.match(/(\d{2})[.\/-](\d{2})[.\/-](\d{2,4})\s+(\d{2}):(\d{2})/);
    if(m){const y=m[3].length===2?'20'+m[3]:m[3];return`${y}-${m[1]}-${m[2]}T${m[4]}:${m[5]}:00.000Z`;}
    return null;
  }

  // Pattern A — MT5 mobile Deals list:
  // "EURUSDm, sell 0.01\n1.17620 → 1.17659"
  const headerRE=/([A-Z]{3,10}m?)[,\s]+(buy|sell)[,\s]*(out\s*)?([\d.]+)/gi;
  let hm;
  while((hm=headerRE.exec(full))!==null){
    const sym=hm[1],type=hm[2].toUpperCase()==='BUY'?'BUY':'SELL',vol=parseFloat(hm[4]);
    const chunk=full.slice(hm.index,hm.index+700);

    // Prices: "1.17620 → 1.17659" or "0.91719 -> 0.92003"
    let openP=0,closeP=0;
    const pm=chunk.match(/([\d.]{4,12})\s*[→\->]+\s*([\d.]{4,12})/);
    if(pm){openP=parseFloat(pm[1]);closeP=parseFloat(pm[2]);}

    // Dates (up to 2)
    const dateRE=/\d{4}[.]\d{2}[.]\d{2}\s+\d{2}:\d{2}/g;
    const dates=[];let dm;
    while((dm=dateRE.exec(chunk))!==null)dates.push(dm[0]);

    // Profit — coloured number at end of header row, or after "Profit:" label
    let profit=0;
    const profLabel=chunk.match(/profit[:\s]+([-\d.]+)/i);
    if(profLabel){profit=parseFloat(profLabel[1]);}
    else{
      // Try last float in first 200 chars (the coloured P&L on MT5 mobile)
      const shorts=chunk.slice(0,200);
      const floats=[...shorts.matchAll(/([-+]?\d+\.\d{2}(?!\d))/g)];
      if(floats.length)profit=parseFloat(floats[floats.length-1][1]);
    }

    const swapM=chunk.match(/swap[:\s]+([-\d.]+)/i);
    const commM=chunk.match(/commission[:\s]+([-\d.]+)/i)||chunk.match(/charges?[:\s]+([-\d.]+)/i);

    trades.push(enrich({
      symbol:sym,type,volume:vol,openPrice:openP,closePrice:closeP,
      openTime:dates[0]?toISO(dates[0]):null,
      closeTime:dates[1]?toISO(dates[1]):dates[0]?toISO(dates[0]):null,
      profit,swap:swapM?parseFloat(swapM[1]):0,
      commission:commM?parseFloat(commM[1]):0,
      source:'screenshot',
    }));
  }

  // Pattern B — table rows (statement / desktop export)
  if(trades.length===0){
    const rowRE=/([A-Z]{3,10})\s+(buy|sell)\s+([\d.]+)\s+([\d.]{4,12})\s+([\d.]{4,12})/gi;
    let rm;
    while((rm=rowRE.exec(full))!==null){
      const chunk=full.slice(rm.index,rm.index+400);
      const dateRE=/\d{4}[.]\d{2}[.]\d{2}\s+\d{2}:\d{2}/g;
      const dates=[];let dm2;
      while((dm2=dateRE.exec(chunk))!==null)dates.push(dm2[0]);
      const floats=[...chunk.matchAll(/([-+]?\d+\.\d{2}(?!\d))/g)];
      const profit=floats.length?parseFloat(floats[floats.length-1][1]):0;
      trades.push(enrich({
        symbol:rm[1],type:rm[2].toUpperCase()==='BUY'?'BUY':'SELL',
        volume:parseFloat(rm[3]),openPrice:parseFloat(rm[4]),closePrice:parseFloat(rm[5]),
        openTime:dates[0]?toISO(dates[0]):null,
        closeTime:dates[1]?toISO(dates[1]):null,
        profit,source:'screenshot',
      }));
    }
  }

  // Deduplicate
  const seen=new Set();
  return trades.filter(t=>{
    const k=`${t.symbol}|${t.type}|${t.openTime}|${t.profit}`;
    if(seen.has(k))return false;seen.add(k);return true;
  });
}

/* ─────────────────────────────────────────────
   LAYER 3: GEMINI TEXT API  (optional)
   Used ONLY for AI Review tab.
   Sends ~500 token TEXT payload — not images.
   Three model fallbacks. Isolated from import.
───────────────────────────────────────────── */
const GMODELS=['gemini-1.5-flash-8b','gemini-2.0-flash-lite','gemini-2.0-flash'];
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function geminiText(key,prompt,onStatus){
  for(let mi=0;mi<GMODELS.length;mi++){
    const model=GMODELS[mi];
    for(let att=0;att<3;att++){
      try{
        const res=await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
          {method:'POST',headers:{'Content-Type':'application/json'},
           body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
             generationConfig:{temperature:0.3,maxOutputTokens:1500}})}
        );
        if(res.ok){
          const d=await res.json();
          return d.candidates?.[0]?.content?.parts?.[0]?.text||'No response.';
        }
        const e=await res.json().catch(()=>({}));
        if(res.status===400||res.status===403)
          throw new Error('Invalid API key — check Settings → Gemini Key.');
        if(res.status===429){
          if(att===2&&mi===GMODELS.length-1)
            throw new Error('Rate limited on all models. Wait 60s and retry.');
          if(att===2)break; // try next model
          const w=25+att*20;
          for(let s=w;s>0;s--){if(onStatus)onStatus(`Quota — retrying in ${s}s (model ${mi+1})…`);await sleep(1000);}
          if(onStatus)onStatus('Retrying…');
          continue;
        }
        if(res.status===404)break; // model not found → next
        throw new Error((e.error?.message)||`API error ${res.status}`);
      }catch(err){
        if(err.message.includes('Invalid API')||err.message.includes('Rate limited'))throw err;
        if(att===2&&mi===GMODELS.length-1)throw err;
        if(att===2)break;
      }
    }
  }
  throw new Error('All models exhausted. Wait 60s and try again.');
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function useChart(buildFn,deps){
  const ref=useRef(),ch=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(ch.current)ch.current.destroy();
    ch.current=buildFn(ref.current.getContext('2d'));
    return()=>{if(ch.current)ch.current.destroy();};
  },deps);
  return ref;
}
function PnlChart({trades}){
  const sorted=useMemo(()=>[...trades].sort((a,b)=>new Date(a.closeTime)-new Date(b.closeTime)),[trades.length]);
  const ref=useChart(ctx=>{
    let run=0;const labels=[],data=[];
    sorted.forEach(t=>{run+=t.profit;labels.push(fmt.date(t.closeTime));data.push(+run.toFixed(2));});
    const isPos=!data.length||data[data.length-1]>=0;
    const g=ctx.createLinearGradient(0,0,0,100);
    g.addColorStop(0,isPos?'rgba(0,230,118,.25)':'rgba(255,61,90,.25)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    return new Chart(ctx,{type:'line',data:{labels,datasets:[{data,
      borderColor:isPos?'#00e676':'#ff3d5a',borderWidth:2,fill:true,
      backgroundColor:g,pointRadius:0,tension:.35}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{x:{display:false},y:{display:false}},animation:{duration:400}}});
  },[trades.length]);
  return<div className="cc"><div className="ctitle">Equity Curve</div><canvas ref={ref} height="100"/></div>;
}
function SessChart({trades}){
  const ref=useChart(ctx=>{
    const sess=['Asian','London','New York','Late Session'];
    const wrs=sess.map(s=>{const ts=trades.filter(t=>t.session===s);
      return ts.length?(ts.filter(t=>t.profit>0).length/ts.length*100).toFixed(1):0;});
    const counts=sess.map(s=>trades.filter(t=>t.session===s).length);
    return new Chart(ctx,{type:'bar',data:{
      labels:sess.map((s,i)=>`${s}(${counts[i]})`),
      datasets:[{data:wrs,backgroundColor:['rgba(0,212,255,.6)','rgba(0,230,118,.6)',
        'rgba(255,183,0,.6)','rgba(124,77,255,.6)'],borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#4a6a80',font:{size:9}},grid:{display:false}},
          y:{ticks:{color:'#4a6a80',font:{size:9},callback:v=>v+'%'},
            grid:{color:'rgba(255,255,255,.04)'},max:100}}}});
  },[trades.length]);
  return<div className="cc"><div className="ctitle">Win Rate by Session</div><canvas ref={ref} height="130"/></div>;
}
function PairChart({trades}){
  const ref=useChart(ctx=>{
    const ps=calcPairs(trades).slice(0,6);
    return new Chart(ctx,{type:'bar',data:{labels:ps.map(p=>p.symbol),
      datasets:[{data:ps.map(p=>+p.pnl.toFixed(2)),
        backgroundColor:ps.map(p=>p.pnl>=0?'rgba(0,230,118,.55)':'rgba(255,61,90,.55)'),
        borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#4a6a80',font:{size:9}},grid:{display:false}},
          y:{ticks:{color:'#4a6a80',font:{size:9},callback:v=>'$'+v},
            grid:{color:'rgba(255,255,255,.04)'}}}}});
  },[trades.length]);
  return<div className="cc"><div className="ctitle">P&L by Instrument</div><canvas ref={ref} height="130"/></div>;
}

function ManualForm({onAdd,onClose}){
  const now=new Date().toISOString().slice(0,16);
  const[sym,setSym]=useState('');
  const[type,setType]=useState('BUY');
  const[vol,setVol]=useState('0.01');
  const[profit,setProfit]=useState('');
  const[openT,setOpenT]=useState(now);
  const[closeT,setCloseT]=useState(now);
  const[openP,setOpenP]=useState('');
  const[closeP,setCloseP]=useState('');
  const[comm,setComm]=useState('0');
  const[err,setErr]=useState('');

  const submit=()=>{
    if(!sym.trim()){setErr('Symbol is required');return;}
    if(profit===''||isNaN(+profit)){setErr('Profit is required');return;}
    onAdd(enrich({symbol:sym,type,volume:+vol||.01,profit:+profit,
      openTime:new Date(openT).toISOString(),
      closeTime:new Date(closeT).toISOString(),
      openPrice:+openP||0,closePrice:+closeP||0,
      commission:+comm||0,swap:0,source:'manual'}));
    onClose();
  };

  return(
    <>
      <div className="mtitle">✏️ Manual Trade Entry</div>
      <div className="msub">Symbol and Profit are required. Everything else is optional.</div>
      {err&&<div className="alert a-r" style={{margin:'0 0 12px'}}>{err}</div>}
      <div className="fgrid">
        <div><label className="inplbl">Symbol *</label>
          <input className="inp" placeholder="EURUSD" value={sym}
            onChange={e=>setSym(e.target.value.toUpperCase())}/></div>
        <div><label className="inplbl">Direction *</label>
          <select className="inp" value={type} onChange={e=>setType(e.target.value)}>
            <option>BUY</option><option>SELL</option>
          </select></div>
      </div>
      <div className="fgrid">
        <div><label className="inplbl">Lot Size</label>
          <input className="inp" type="number" step=".01" value={vol}
            onChange={e=>setVol(e.target.value)}/></div>
        <div><label className="inplbl">Net Profit ($) *</label>
          <input className="inp" type="number" step=".01" placeholder="-5.40"
            value={profit} onChange={e=>setProfit(e.target.value)}/></div>
      </div>
      <div className="fg1"><label className="inplbl">Open Time</label>
        <input className="inp" type="datetime-local" value={openT}
          onChange={e=>setOpenT(e.target.value)}/></div>
      <div className="fg1"><label className="inplbl">Close Time</label>
        <input className="inp" type="datetime-local" value={closeT}
          onChange={e=>setCloseT(e.target.value)}/></div>
      <div className="fgrid">
        <div><label className="inplbl">Open Price</label>
          <input className="inp" type="number" step=".00001" placeholder="1.08540"
            value={openP} onChange={e=>setOpenP(e.target.value)}/></div>
        <div><label className="inplbl">Close Price</label>
          <input className="inp" type="number" step=".00001" placeholder="1.08690"
            value={closeP} onChange={e=>setCloseP(e.target.value)}/></div>
      </div>
      <div className="fg1"><label className="inplbl">Commission ($)</label>
        <input className="inp" type="number" step=".01" value={comm}
          onChange={e=>setComm(e.target.value)}/></div>
      <button className="btn btn-g" style={{marginBottom:10}} onClick={submit}>
        ➕ Add Trade to Journal
      </button>
      <button className="btn btn-o" onClick={onClose}>Cancel</button>
    </>
  );
}

  const[pct,setPct]=useState(0);
  const[statusMsg,setStatus]=useState('');
  const[parsed,setParsed]=useState(null);
  const[rawOcr,setRaw]=useState('');
  const[showRaw,setShowRaw]=useState(false);
  const[err,setErr]=useState('');
  const[drag,setDrag]=useState(false);
  const fRef=useRef();

  const loadFile=f=>{
    if(!f)return;
    const r=new FileReader();
    r.onload=e=>{setSrc(e.target.result);setParsed(null);setErr('');setRaw('');setPct(0);};
    r.readAsDataURL(f);
  };

  const extract=async()=>{
    if(!src){setErr('Choose a screenshot first.');return;}
    setLoad(true);setErr('');setParsed(null);setRaw('');setPct(0);

        setErr('No trades detected. See raw OCR text below — if it looks garbled, try a landscape screenshot with higher brightness. Or switch to Manual Entry.');
        setShowRaw(true);

        setParsed(trades);

      setErr(e.message);

      setLoad(false);setStatus('');

function AITab({trades,settings}){
  const[range,setRange]=useState('7');

  const[loading,setLoad]=useState(false);
  const[status,setStatus]=useState('');

  const filtered=useMemo(()=>{
    const c=new Date(Date.now()-+range*86400000);
    return trades.filter(t=>new Date(t.closeTime)>=c);
  },[trades,range]);

  const run=async()=>{
    if(!settings.geminiKey){setErr('Add your free Gemini API key in Settings first.');return;}
    if(!filtered.length){setErr('No trades in this date range.');return;}
    setErr('');setReview('');setLoad(true);setStatus('');

/* ─────────────────────────────────────────────
   ROOT APP
───────────────────────────────────────────── */
function App(){
  const[tab,setTab]          =useState('dash');
  const[trades,setTrades]    =useState(()=>LS.get('ict_trades')||[]);
  const[notes,setNotes]      =useState(()=>LS.get('ict_notes')||{});
  const[settings,setSettings]=useState(()=>LS.get('ict_settings')||{});
  const[showImport,setImport]=useState(false);
  const[flash,setFlash]      =useState('');

  useEffect(()=>{LS.set('ict_trades',trades);},[trades]);

  const dedup=t=>`${t.symbol}|${t.type}|${t.openTime}|${t.profit}`;

  const handleImport=useCallback(incoming=>{
    setTrades(prev=>{
      const ex=new Set(prev.map(dedup));
      const fresh=incoming.filter(t=>!ex.has(dedup(t)));
      if(!fresh.length){
        setFlash('⚠️ Already imported — no duplicates added.');
        setTimeout(()=>setFlash(''),4000);
        return prev;
      }
      setFlash(`✅ ${fresh.length} trade${fresh.length!==1?'s':''} added!`);
      setTimeout(()=>setFlash(''),4000);
      return[...prev,...fresh].sort((a,b)=>new Date(b.closeTime)-new Date(a.closeTime));
    });
    setTab('trades');
  },[]);

  const deleteTrade=useCallback(id=>setTrades(p=>p.filter(t=>t.id!==id)),[]);
  const saveNote=useCallback((id,val)=>{
    const n={...notes,[id]:val};setNotes(n);LS.set('ict_notes',n);
  },[notes]);
  const saveSettings=useCallback(s=>{setSettings(s);LS.set('ict_settings',s);},[]);
  const loadDemo=useCallback(()=>{
    setTrades(genDemo());setTab('dash');
    setFlash('✅ 30 demo trades loaded!');setTimeout(()=>setFlash(''),3000);
  },[]);
  const clearAll=useCallback(()=>{
    setTrades([]);setNotes({});LS.set('ict_trades',[]);LS.set('ict_notes',{});
  },[]);

  const tw=useMemo(()=>trades.map(t=>({...t,note:notes[t.id]||''})),[trades,notes]);
  const totalPnl=useMemo(()=>trades.reduce((s,t)=>s+t.profit,0),[trades]);

  const nav=[
    {id:'dash',icon:'⊟',label:'Home'},
    {id:'trades',icon:'📋',label:'Trades'},
    {id:'chart',icon:'📈',label:'Analytics'},
    {id:'ai',icon:'🤖',label:'AI Review'},
    {id:'set',icon:'⚙️',label:'Settings'},
  ];

  return(<div className="app">
    <div className="hdr">
      <div className="hlogo">
        <div className="hpulse"/>
        <div className="htitle">ICT <span>Journal</span></div>
        {trades.length>0&&(
          <span style={{fontSize:9,fontWeight:700,color:'var(--muted)',background:'var(--bg3)',
                        border:'1px solid var(--border)',borderRadius:4,padding:'2px 6px'}}>
            {trades.length}T
          </span>
        )}
      </div>
      {trades.length>0&&(
        <span className="mono" style={{fontSize:13,fontWeight:700,
          color:totalPnl>=0?'var(--green)':'var(--red)'}}>
          {fmt.usd(totalPnl)}
        </span>
      )}
    </div>

    <div className="content">
      {flash&&<div className={`alert ${flash.startsWith('✅')?'a-g':'a-a'}`}>{flash}</div>}
      {tab==='dash'  &&<Dashboard trades={tw}/>}
      {tab==='trades'&&<TradesTab trades={tw} notes={notes} onSaveNote={saveNote} onDelete={deleteTrade}/>}
      {tab==='chart' &&<AnalyticsTab trades={tw}/>}
      {tab==='ai'    &&<AITab trades={tw} settings={settings}/>}
      {tab==='set'   &&<SettingsTab settings={settings} onSave={saveSettings}
                         onDemo={loadDemo} trades={trades} onClear={clearAll}/>}
    </div>

    <button className="fab" onClick={()=>setImport(true)} title="Import trades">📸</button>

    <div className="bnav">
      {nav.map(n=>(
        <div key={n.id} className={`ni${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}>
          <div className="nicon">{n.icon}</div>
          <div className="nlbl">{n.label}</div>
        </div>
      ))}
    </div>

    {showImport&&<ImportModal onClose={()=>setImport(false)} onImport={handleImport}/>}
  </div>);
}

try{
  const m={name:'ICT Trading Journal',short_name:'ICT Journal',
           start_url:'./',display:'standalone',
           background_color:'#070a0d',theme_color:'#070a0d'};
  const l=document.createElement('link');l.rel='manifest';
  l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  document.head.appendChild(l);
}catch(e){}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
